<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Расходы</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Все расходы</h2>

    <div class="mb-3">

        <a href="/" class="btn btn-secondary">
            Главная
        </a>

        <a href="/expense" class="btn btn-danger">
            + Добавить расход
        </a>

        <a href="/incomes" class="btn btn-success">
            Доходы
        </a>

    </div>

    <table class="table table-striped table-bordered">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Дата</th>
                <th>Сумма</th>
                <th>Категория</th>
                <th>Комментарий</th>
                <th width="150">Действия</th>
            </tr>
        </thead>

        <tbody>

        {% for item in expenses %}

            <tr>
                <td>{{ item.id }}</td>
                <td>{{ item.expense_date }}</td>
                <td>{{ "{:,.0f}".format(item.amount) }}</td>
                <td>{{ item.category }}</td>
                <td>{{ item.comment }}</td>

                <td>

                    <a href="/expense/edit/{{ item.id }}"
                       class="btn btn-sm btn-primary">
                        ✏️
                    </a>

                    <a href="/expense/delete/{{ item.id }}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Удалить запись?')">
                        🗑️
                    </a>

                </td>
            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
