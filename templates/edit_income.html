<!DOCTYPE html>
<html>
<head>
    <title>Редактирование дохода</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

<h2>Редактирование дохода</h2>

<form method="post">

    <div class="mb-3">
        <label>Дата</label>
        <input type="date"
               name="income_date"
               value="{{ income.income_date }}"
               class="form-control">
    </div>

    <div class="mb-3">
        <label>Сумма</label>
        <input type="number"
               name="amount"
               value="{{ income.amount }}"
               class="form-control">
    </div>

    <div class="mb-3">
        <label>Категория</label>
        <input type="text"
               name="category"
               value="{{ income.category }}"
               class="form-control">
    </div>

    <div class="mb-3">
        <label>Комментарий</label>
        <input type="text"
               name="comment"
               value="{{ income.comment }}"
               class="form-control">
    </div>

    <button class="btn btn-primary">
        Сохранить
    </button>

</form>

</div>

</body>
</html>
