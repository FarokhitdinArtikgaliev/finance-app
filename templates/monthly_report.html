<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Отчёт по месяцам</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1>Доходы по месяцам</h1>

    <a href="/" class="btn btn-secondary mb-3">
        Главная
    </a>
    <div class="card mb-4">
        <div class="card-body">
            <canvas id="financeChart"></canvas>
        </div>
    </div>

    <table class="table table-bordered">

        <thead>
            <tr>
                <th>Месяц</th>
                <th>Доход</th>
            </tr>
        </thead>

        <tbody>

        {% for item in incomes %}

            <tr>
                <td>{{ item.month }}</td>
                <td>{{ "{:,.0f}".format(item.total) }}</td>
            </tr>

        {% endfor %}

        </tbody>

    </table>

    <hr>

    <h1>Расходы по месяцам</h1>

    <table class="table table-bordered">

        <thead>
            <tr>
                <th>Месяц</th>
                <th>Расход</th>
            </tr>
        </thead>

        <tbody>

        {% for item in expenses %}

            <tr>
                <td>{{ item.month }}</td>
                <td>{{ "{:,.0f}".format(item.total) }}</td>
            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const labels = {{ labels|tojson }};

const incomeData = {{ income_values|tojson }};

const expenseData = {{ expense_values|tojson }};

new Chart(
    document.getElementById('financeChart'),
    {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                {
                    label: 'Доходы',
                    data: incomeData,
                    borderColor: 'green'
                },
                {
                    label: 'Расходы',
                    data: expenseData,
                    borderColor: 'red'
                }
            ]
        }
    }
);

</script>
</body>
</html>
