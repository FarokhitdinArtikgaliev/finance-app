<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Отчёты</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1>Отчёт по расходам</h1>

    <a href="/" class="btn btn-secondary mb-3">
        На главную
    </a>

    <table class="table table-striped">

        <thead>
            <tr>
                <th>Категория</th>
                <th>Сумма</th>
            </tr>
        </thead>

        <tbody>

        {% for item in expenses %}

            <tr>
                <td>{{ item.category }}</td>
                <td>{{ "{:,.0f}".format(item.total) }} сум</td>
            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
