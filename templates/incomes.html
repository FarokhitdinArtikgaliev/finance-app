<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Доходы</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Все доходы</h2>

    <div class="mb-3">

        <a href="/" class="btn btn-secondary">
            Главная
        </a>

        <a href="/income" class="btn btn-success">
            + Добавить доход
        </a>

        <a href="/expenses" class="btn btn-warning">
            Расходы
        </a>

    </div>

    <table class="table table-striped table-bordered">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Дата</th>
                <th>Сумма</th>
                <th>Категория</th>
                <th>Комментарий</th>
                <th width="120">Действия</th>
            </tr>
        </thead>

        <tbody>

        {% for item in incomes %}

            <tr>
                <td>{{ item.id }}</td>
                <td>{{ item.income_date }}</td>
                <td>{{ "{:,.0f}".format(item.amount) }}</td>
                <td>{{ item.category }}</td>
                <td>{{ item.comment }}</td>

                <td>

    <a href="/income/edit/{{ item.id }}"
       class="btn btn-sm btn-primary">
        ✏️
    </a>

    <a href="/income/delete/{{ item.id }}"
       class="btn btn-sm btn-danger"
       onclick="return confirm('Удалить запись?')">
        🗑️
    </a>

</td>
            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
