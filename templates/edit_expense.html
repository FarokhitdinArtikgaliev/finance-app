<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Редактирование расхода</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Редактирование расхода</h2>

    <form method="post">

        <div class="mb-3">
            <label>Дата</label>
            <input type="date"
                   name="expense_date"
                   value="{{ expense.expense_date }}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Сумма</label>
            <input type="number"
                   name="amount"
                   value="{{ expense.amount }}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Категория</label>
           <select name="category" class="form-select">

    <option>Продукты</option>
    <option>Транспорт</option>
    <option>Коммуналка</option>
    <option>Интернет</option>
    <option>Спортзал</option>
    <option>Одежда</option>
    <option>Ипотека</option>
    <option>Прочее</option>

</select>
        </div>

        <div class="mb-3">
            <label>Комментарий</label>
            <input type="text"
                   name="comment"
                   value="{{ expense.comment }}"
                   class="form-control">
        </div>

        <button class="btn btn-primary">
            Сохранить
        </button>

        <a href="/expenses" class="btn btn-secondary">
            Отмена
        </a>

    </form>

</div>

</body>
</html>
